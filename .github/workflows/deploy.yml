name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: YOUR_VM_IP
          username: ansy
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/myproject
            git pull origin main
            docker compose down
            docker compose up -d --build
